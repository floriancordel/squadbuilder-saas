<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SquadBuilder — Org Produit / R&D</title>
<style>
  :root{
    --bg:#f6f8fb; --panel:#fff; --ink:#1f2937; --muted:#6b7280; --faint:#9ca3af;
    --line:#d1d5db; --border:#e6e8ec; --conn:#64748b;
    --dir:#7c3aed; --squad:#4f46e5; --cellc:#0d9488;
    --produit:#7c3aed; --produit-soft:#f3effe;
    --tech:#2563eb; --tech-soft:#eef4ff;
    --fr-bg:#dbeafe; --fr-ink:#1e40af;
    --coe-bg:#dcfce7; --coe-ink:#166534;
    --open:#d97706; --open-bg:#fffbeb; --open-bd:#fcd34d;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.08);
    --shadow-lg:0 12px 32px rgba(16,24,40,.16);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  body{display:flex;flex-direction:column;overflow:hidden}
  button{font-family:inherit}

  /* ---------- Barre du haut ---------- */
  header{display:flex;align-items:center;gap:14px;padding:9px 16px;background:var(--panel);border-bottom:1px solid var(--border);z-index:30;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--produit),var(--tech));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
  .brand h1{font-size:15px;font-weight:700;margin:0;letter-spacing:-.02em}
  .stats{display:flex;gap:12px;font-size:12px;color:var(--muted)}
  .stats b{color:var(--ink);font-weight:700}
  .spacer{flex:1}
  .btn{border:1px solid var(--border);background:#fff;color:var(--ink);border-radius:9px;padding:7px 12px;font-size:13px;cursor:pointer;transition:.14s;display:inline-flex;align-items:center;gap:6px;font-weight:500}
  .btn:hover{background:#f2f4f7;border-color:var(--line)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#111827}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:7px 9px}
  .btn.ghost:hover{background:#f2f4f7;color:var(--ink)}
  .zoom{display:flex;align-items:center;gap:2px;border:1px solid var(--border);border-radius:9px;padding:2px;background:#fff}
  .zoom button{border:0;background:transparent;width:28px;height:26px;border-radius:6px;cursor:pointer;font-size:16px;color:var(--ink)}
  .zoom button:hover{background:#f2f4f7}
  .zoom .lvl{font-size:11.5px;color:var(--muted);min-width:38px;text-align:center}
  .legend{display:flex;gap:12px;align-items:center;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .legend .item{display:flex;align-items:center;gap:5px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}

  /* ---------- Zone principale ---------- */
  #viewport{flex:1;position:relative;overflow:hidden;cursor:grab}
  #viewport.grabbing{cursor:grabbing}
  #canvas{position:absolute;top:0;left:0;transform-origin:0 0;padding:40px}

  /* ---------- Arbre ---------- */
  .tree{display:inline-block}
  .tree ul{position:relative;padding-top:52px;display:flex;justify-content:center;margin:0;padding-left:0}
  .tree li{list-style:none;position:relative;padding:52px 16px 0;display:flex;flex-direction:column;align-items:center}
  .tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;width:50%;height:52px;border-top:3px solid var(--conn)}
  .tree li::after{right:auto;left:50%;border-left:3px solid var(--conn)}
  .tree li:first-child::before,.tree li:last-child::after{border:0 none}
  .tree li:last-child::before{border-right:3px solid var(--conn);border-radius:0 8px 0 0}
  .tree li:first-child::after{border-radius:8px 0 0 0}
  .tree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:3px solid var(--conn);width:0;height:52px}
  .tree > ul{padding-top:0}
  /* enfant unique : une ligne verticale centrée (doit passer APRES first/last-child pour gagner) */
  .tree li:only-child{padding-top:52px}
  .tree li:only-child::before{display:none}
  .tree li:only-child::after{content:'';display:block;top:0;left:50%;right:auto;width:50%;height:52px;border:0;border-left:3px solid var(--conn);border-radius:0}
  .tree li.rootnode{padding-top:0!important}
  .tree li.rootnode::before,.tree li.rootnode::after{display:none!important;border:0!important}

  .node-content{position:relative;display:flex;flex-direction:column;align-items:center}

  /* Conteneur Tribu (binôme HoP/EM) */
  .tribe{border:1.5px solid #e2e5ea;background:linear-gradient(180deg,#fbfcfe,#f6f8fb);border-radius:16px;padding:8px 14px 14px;position:relative}
  .tribe-cap{display:flex;align-items:center;gap:8px;padding:2px 2px 9px;min-height:24px;cursor:pointer}
  .tribe-cap .tc-left{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:flex;align-items:center;gap:6px}
  .tribe-cap .cap-edit{margin-left:auto;color:var(--faint);font-size:12px;opacity:0;transition:.14s}
  .tribe:hover .tribe-cap .cap-edit{opacity:.6}
  .tribe-cap:hover .cap-edit{opacity:1;color:var(--ink)}
  .tribe-cap .tc-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--produit),var(--tech))}
  /* Bouton plier/déplier PERSISTANT, posé sur le trait sous chaque bloc */
  .foldbtn{position:absolute;top:calc(100% + 30px);left:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;border:1.5px solid var(--conn);background:#fff;color:var(--conn);font-size:12px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:10}
  .foldbtn:hover{background:var(--conn);color:#fff}
  .foldbtn .fn{position:absolute;top:-7px;right:-9px;background:var(--tech);color:#fff;font-size:9px;font-weight:700;border-radius:20px;padding:0 5px;height:14px;display:none;align-items:center}
  .foldbtn.iscoll .fn{display:flex}
  /* Barre d'ajout flottante, chevauche le bas du bloc (accessible), séparée du fold */
  .node-tools{position:absolute;top:100%;left:50%;transform:translate(-50%,-50%);display:flex;gap:5px;background:#fff;border:1px solid var(--border);border-radius:11px;padding:4px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.14s;z-index:9;white-space:nowrap}
  .node-content:hover > .node-tools,.cell:hover > .node-tools,.node-tools.always{opacity:1;pointer-events:auto}
  .ntbtn{border:1px solid var(--border);background:#fff;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);line-height:1.5;white-space:nowrap}
  .ntbtn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  .ntbtn.tribu:hover{background:var(--produit);border-color:var(--produit);color:#fff}
  .ntbtn.add:hover{background:var(--squad);border-color:var(--squad);color:#fff}
  .ntbtn.cellbtn:hover{background:var(--cellc);border-color:var(--cellc);color:#fff}
  .ntbtn.danger:hover{background:#dc2626;border-color:#dc2626;color:#fff}
  .direction-tribe{border:2px solid #c4b5fd;background:linear-gradient(180deg,#faf9ff,#f1ecfd)}
  .direction-tribe .tc-dot{background:var(--dir)}

  /* Support Cells sur les côtés de la tribu */
  .cell{width:236px;background:#fff;border:1.5px dashed #9ec7c1;border-radius:12px;box-shadow:var(--shadow);position:relative}
  .badge-sc{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--cellc);background:#e6faf5;border:1px solid #bfeae2;border-radius:20px;padding:1px 6px;flex:0 0 auto}
  .cell-head{display:flex;align-items:center;gap:7px;padding:8px 10px;background:#f0fdfa;border-bottom:1px solid #cfeae5;border-radius:11px 11px 0 0;cursor:pointer}
  .cell-head .cdot{width:8px;height:8px;border-radius:50%;background:var(--cellc);flex:0 0 auto}
  .cell-head .cname{font-size:12px;font-weight:700;letter-spacing:-.01em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cell-head .ccount{font-size:10px;color:var(--muted);background:#fff;border:1px solid var(--border);border-radius:20px;padding:1px 7px}
  .cell.iscoll .cell-head{border-bottom:0;border-radius:11px}
  .bucket.iscoll .bucket-head{border-bottom:0;border-radius:14px}
  .foldbtn.sqfold,.foldbtn.cellfold{width:24px;height:24px;font-size:12px}
  .cell-body{padding:9px;display:flex;flex-direction:column;gap:6px}
  .cres{position:relative;background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px 8px 6px 11px;overflow:hidden;cursor:pointer;transition:.12s}
  .cres:hover{border-color:var(--line);box-shadow:var(--shadow)}
  .cres .accent{position:absolute;left:0;top:0;bottom:0;width:3px}
  .cres.produit .accent{background:var(--produit)}.cres.tech .accent{background:var(--tech)}
  .cres .cr-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .cres .cr-name{font-size:11.5px;font-weight:650;line-height:1.2}
  .cres .cr-name.open{color:var(--open);font-style:italic}
  .cres .alloc{font-size:10px;font-weight:700;color:#0f766e;background:#ccfbf1;border-radius:20px;padding:1px 6px;flex:0 0 auto}
  .cres .cr-role{font-size:10px;color:var(--muted);line-height:1.25;margin-top:1px}
  .cres .cr-loc{font-size:9.5px;color:var(--faint);display:flex;align-items:center;gap:3px;margin-top:3px}
  .cres.isopen{border-style:dashed;border-color:var(--open-bd);background:var(--open-bg)}
  .add-res{border:1px dashed var(--line);border-radius:8px;padding:6px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;background:#fcfdff}
  .add-res:hover{border-color:#64748b;color:#475569;background:#f1f5f9}
  .act.cellbtn:hover{background:#64748b;border-color:#64748b}
  .alloc-in{display:flex;align-items:center;gap:4px}
  .alloc-in input{width:100%}
  .alloc-in span{font-size:12px;color:var(--muted)}

  /* Bande "rattachée à" */
  .reports{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);padding:7px 12px;background:#fbfcfe;border-bottom:1px solid var(--border);cursor:pointer}
  .reports b{color:var(--ink);font-weight:650}
  .reports .chev{color:var(--tech);font-weight:700}
  .reports:hover{background:var(--tech-soft)}

  /* ---------- Duo (cartes liées) ---------- */
  .duo{position:relative;display:flex;align-items:stretch;gap:26px}
  .duo::before{content:'';position:absolute;top:38px;left:24px;right:24px;height:2px;background:var(--line);z-index:0}
  .card{position:relative;z-index:1;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);width:198px;padding:12px 13px 11px;text-align:left;overflow:hidden;cursor:pointer;transition:.14s}
  .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);border-color:var(--line)}
  .card .accent{position:absolute;left:0;top:0;bottom:0;width:4px}
  .card.produit .accent{background:var(--produit)}
  .card.tech .accent{background:var(--tech)}
  .card .role{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:2px;line-height:1.25}
  .card .name{font-size:14.5px;font-weight:650;letter-spacing:-.01em;line-height:1.2}
  .card .name.open{color:var(--open);font-style:italic;font-weight:600}
  .card .foot{display:flex;align-items:center;gap:6px;margin-top:9px;flex-wrap:wrap}
  .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
  .badge.fr{background:var(--fr-bg);color:var(--fr-ink)}
  .badge.coe{background:var(--coe-bg);color:var(--coe-ink)}
  .badge.status{background:var(--open-bg);color:var(--open);border:1px solid var(--open-bd)}
  .card.isopen{border-style:dashed;border-color:var(--open-bd);background:var(--open-bg)}
  .node-direction .card{width:216px}
  .node-direction .card .name{font-size:16px}

  /* ---------- Bucket Squad ---------- */
  .bucket{background:#fff;border:1px solid var(--border);border-top:3px solid var(--squad);border-radius:14px;box-shadow:var(--shadow);width:328px;overflow:hidden}
  .bucket-head{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:#eef2ff;border-bottom:1px solid #e0e4f5;cursor:pointer}
  .bucket-head .sq{width:8px;height:8px;border-radius:2px;background:var(--squad);margin-top:4px;flex:0 0 auto}
  .bucket.flying{border:1.5px dashed #c4b5fd;border-top:3px solid var(--dir)}
  .bucket.flying .bucket-head{background:#f6f3fe;border-bottom-color:#e6ddfb}
  .bucket.flying .sq{background:var(--dir)}
  .fly-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--dir);background:#f3effe;border:1px solid #ddd0fb;border-radius:20px;padding:1px 6px;flex:0 0 auto;margin-top:1px}
  .bucket-head .bh-txt{min-width:0;flex:1}
  .bucket-head .title{font-size:13.5px;font-weight:700;letter-spacing:-.01em;display:block}
  .bucket-head .bucket-desc{font-size:11px;color:var(--muted);line-height:1.35;margin-top:2px}
  .bucket-head .count{font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--border);border-radius:20px;padding:1px 8px;flex:0 0 auto;margin-top:1px}
  .bucket-del{border:0;background:transparent;cursor:pointer;font-size:12px;opacity:0;transition:.12s;padding:2px 5px;border-radius:6px;flex:0 0 auto;margin-top:1px;line-height:1}
  .bucket:hover .bucket-del{opacity:.5}
  .bucket-del:hover{opacity:1;background:#fef2f2}
  .bucket-body{padding:12px}
  .bucket .duo{gap:16px;justify-content:center;margin-bottom:12px}
  .bucket .duo::before{top:34px;left:14px;right:14px}
  .bucket .duo .card{width:138px;padding:9px 10px}
  .bucket .duo .card .name{font-size:12.5px}
  .bucket .duo .card .role{font-size:9.5px}
  .rnd-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);margin:2px 0 8px;display:flex;align-items:center;gap:6px}
  .rnd-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .rnd-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .mini{position:relative;background:#fff;border:1px solid var(--border);border-radius:9px;padding:7px 8px 7px 12px;overflow:hidden;cursor:pointer;transition:.12s}
  .mini:hover{border-color:var(--line);box-shadow:var(--shadow)}
  .mini .accent{position:absolute;left:0;top:0;bottom:0;width:3px}
  .mini.produit .accent{background:var(--produit)}
  .mini.tech .accent{background:var(--tech)}
  .mini .m-name{font-size:12px;font-weight:600;line-height:1.2}
  .mini .m-name.open{color:var(--open);font-style:italic}
  .mini .m-role{font-size:10px;color:var(--muted);line-height:1.25;margin-top:1px}
  .mini .m-foot{display:flex;align-items:center;gap:4px;margin-top:5px}
  .mini .mdot{width:7px;height:7px;border-radius:50%}
  .mini .mdot.fr{background:#3b82f6}.mini .mdot.coe{background:#22c55e}
  .mini .m-loc{font-size:9.5px;color:var(--faint)}
  .mini.isopen{border-style:dashed;border-color:var(--open-bd);background:var(--open-bg)}
  .add-mini{display:flex;align-items:center;justify-content:center;gap:5px;border:1px dashed var(--line);border-radius:9px;padding:9px;color:var(--muted);font-size:11.5px;font-weight:600;cursor:pointer;background:#fcfdff;transition:.12s}
  .add-mini:hover{border-color:var(--tech);color:var(--tech);background:var(--tech-soft)}

  /* ---------- Boutons d'action sous les nœuds ---------- */
  .actions{display:flex;gap:6px;margin-top:14px;opacity:0;transition:.14s}
  .node-content:hover > .actions{opacity:1}
  .actions.always{opacity:1}
  .act{border:1px solid var(--border);background:#fff;border-radius:8px;padding:4px 10px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;gap:4px;box-shadow:var(--shadow)}
  .act:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  .act.add:hover{background:var(--tech);border-color:var(--tech)}
  .act.danger:hover{background:#dc2626;border-color:#dc2626}

  /* plier/déplier */
  .toggle{position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);z-index:6;width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);line-height:1}
  .toggle:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  li.collapsed > ul{display:none}
  .toggle .bn{position:absolute;top:-8px;right:-11px;background:var(--tech);color:#fff;font-size:9px;font-weight:700;border-radius:20px;padding:0 5px;height:14px;display:none;align-items:center}
  li.collapsed > .node-content .toggle .bn{display:flex}

  /* ---------- Panneau d'édition ---------- */
  #overlay{position:fixed;inset:0;background:rgba(17,24,39,.28);z-index:40;opacity:0;pointer-events:none;transition:.18s}
  #overlay.open{opacity:1;pointer-events:auto}
  #editor{position:fixed;top:0;right:0;height:100%;width:340px;background:#fff;box-shadow:var(--shadow-lg);z-index:50;transform:translateX(100%);transition:.22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  #editor.open{transform:none}
  .ed-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
  .ed-head .kind{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .ed-head .close{margin-left:auto;border:0;background:#f2f4f7;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--muted)}
  .ed-head .close:hover{background:#e5e7eb;color:var(--ink)}
  .ed-body{padding:16px 18px;overflow:auto;flex:1}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13.5px;color:var(--ink);background:#fff}
  .field input:focus,.field select:focus{outline:none;border-color:var(--tech);box-shadow:0 0 0 3px var(--tech-soft)}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;border:1px solid var(--border);background:#fff;border-radius:8px;padding:8px;font-size:12px;cursor:pointer;color:var(--muted);font-weight:600}
  .seg button.on{border-color:var(--ink);color:var(--ink);background:#f9fafb}
  .seg button.on.produit{border-color:var(--produit);color:var(--produit);background:var(--produit-soft)}
  .seg button.on.tech{border-color:var(--tech);color:var(--tech);background:var(--tech-soft)}
  .seg button.on.fr{border-color:var(--fr-ink);color:var(--fr-ink);background:var(--fr-bg)}
  .seg button.on.coe{border-color:var(--coe-ink);color:var(--coe-ink);background:var(--coe-bg)}
  .seg button.on.open{border-color:var(--open);color:var(--open);background:var(--open-bg)}
  .ed-foot{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
  .ed-foot .btn{flex:1;justify-content:center}
  .hint{font-size:11.5px;color:var(--faint);line-height:1.5;background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-top:4px}

  /* ---------- Modal création squad ---------- */
  #modalOv{position:fixed;inset:0;background:rgba(17,24,39,.4);z-index:70;opacity:0;pointer-events:none;transition:.16s}
  #modalOv.open{opacity:1;pointer-events:auto}
  #modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-48%) scale(.98);width:560px;max-width:94vw;max-height:90vh;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);z-index:80;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:.18s cubic-bezier(.4,0,.2,1)}
  #modal.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
  .m-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border)}
  .m-head .m-ico{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--produit),var(--tech));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
  .m-head h2{margin:0;font-size:16px;font-weight:700;letter-spacing:-.01em}
  .m-head .m-sub{font-size:12px;color:var(--muted)}
  .m-head .close{margin-left:auto;border:0;background:#f2f4f7;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--muted)}
  .m-head .close:hover{background:#e5e7eb;color:var(--ink)}
  .m-body{padding:18px 20px;overflow:auto;flex:1}
  .m-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
  .section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .section:first-child{margin-top:0}
  .section::after{content:'';flex:1;height:1px;background:var(--border)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .lead-box{border:1px solid var(--border);border-radius:10px;padding:11px 12px}
  .lead-box.produit{border-left:3px solid var(--produit)}
  .lead-box.tech{border-left:3px solid var(--tech)}
  .lead-box .lb-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px}
  .lead-box.produit .lb-title{color:var(--produit)}
  .lead-box.tech .lb-title{color:var(--tech)}
  .mini-seg{display:flex;gap:4px;margin-top:7px}
  .mini-seg button{flex:1;border:1px solid var(--border);background:#fff;border-radius:7px;padding:5px;font-size:10.5px;cursor:pointer;color:var(--muted);font-weight:600}
  .mini-seg button.on{border-color:var(--ink);color:var(--ink);background:#f9fafb}
  .mini-seg button.on.fr{border-color:var(--fr-ink);color:var(--fr-ink);background:var(--fr-bg)}
  .mini-seg button.on.coe{border-color:var(--coe-ink);color:var(--coe-ink);background:var(--coe-bg)}
  .rnd-row{display:grid;grid-template-columns:1.1fr 1.2fr auto auto;gap:8px;align-items:center;margin-bottom:8px}
  .rnd-row.cell-row{grid-template-columns:1.1fr 1fr auto 88px auto}
  .rnd-row.cell-row .alloc-in input{width:100%}
  .rnd-row input,.rnd-row select{border:1px solid var(--border);border-radius:8px;padding:8px 9px;font-size:12.5px;width:100%;font-family:inherit}
  .rnd-row .del{border:1px solid var(--border);background:#fff;border-radius:8px;width:32px;height:34px;cursor:pointer;color:#dc2626;font-size:15px}
  .rnd-row .del:hover{background:#fef2f2;border-color:#fecaca}
  .add-row{border:1px dashed var(--line);background:#fcfdff;border-radius:9px;padding:8px;width:100%;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
  .add-row:hover{border-color:var(--tech);color:var(--tech);background:var(--tech-soft)}
  textarea.f{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13.5px;font-family:inherit;resize:vertical;min-height:58px;color:var(--ink)}
  textarea.f:focus,.m-body input:focus,.m-body select:focus{outline:none;border-color:var(--tech);box-shadow:0 0 0 3px var(--tech-soft)}
  .m-body input,.m-body select{border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13.5px;width:100%;font-family:inherit;color:var(--ink)}
  .fld{margin-bottom:12px}
  .fld > label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  #empty{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;color:var(--muted)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:60;opacity:0;transition:.2s;box-shadow:var(--shadow-lg)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media print{
    header,#overlay,#editor,.actions,.toggle,.add-mini,.zoom{display:none!important}
    #viewport{overflow:visible}#canvas{position:static;transform:none!important;padding:0}
    .card:hover,.mini:hover{transform:none;box-shadow:var(--shadow)}
  }
</style>
</head>
<body>
<header>

<div id="modalOv"></div>

    <button class="close" id="mClose">×</button>
  </div>
  <div class="m-body" id="mBody"></div>

<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
"use strict";
const $=s=>document.querySelector(s);
const viewport=$('#viewport'), canvas=$('#canvas');
const LS_KEY='squadbuilder.v1';
const LOCS=[['','—'],['FR','Hub · FR'],['Maroc','COE · Maroc']];
const STATUSES=['Occupé','Ouvert','Recrutement'];

let state=null, collapsed=new Set(), pmap={};

/* ---------------- Modèle ---------------- */
const uid=()=>Math.random().toString(36).slice(2,9);
function person(role,side,name='',loc='',status='Ouvert'){return{pid:uid(),role,side,name,loc,status};}
function newSquad(name,desc,withDuo){
  const sq={id:uid(),name:name||'Nouvelle squad',desc:desc||'',pm:null,lead:null,members:[]};
  if(withDuo!==false){ sq.pm=person('Product Manager','produit'); sq.lead=person('Tech Lead','tech'); }
  return sq;
}
function binomeLabel(h){
  const p=h.product.name||'HoP ouvert', t=h.tech.name||'EM ouvert';
  return p+' & '+t;
}
function headLabel(h,i){ return 'Tribu '+(i+1)+' — '+binomeLabel(h); }
function findHeadOfSquad(sqId){ return state.heads.find(h=>h.squads.some(s=>s.id===sqId))||null; }
function moveSquad(sqId,target){
  let sq=null;
  state.heads.forEach(h=>{ const i=h.squads.findIndex(s=>s.id===sqId); if(i>=0){ sq=h.squads[i]; h.squads.splice(i,1); } });
  const di=(state.squads||[]).findIndex(s=>s.id===sqId); if(di>=0){ sq=state.squads[di]; state.squads.splice(di,1); }
  if(!sq)return;
  if(target==='__dir__'){ state.squads.push(sq); }
  else { const nh=state.heads.find(h=>h.id===target); if(nh){ nh.squads.push(sq); collapsed.delete(nh.id); } else state.squads.push(sq); }
}
function newHead(){
  return {id:uid(),
    product:person('Head of Product','produit'),
    tech:person('Engineering Manager','tech'),
    squads:[],cells:[]};
}
const TRANSVERSE_ROLES=['QA Engineer','Software Architect','UX Designer','UI Designer','UX Researcher','UX Writer','Data Analyst','Data Engineer','DevOps Engineer','SRE','Security Engineer','Product Ops','Agile Coach','Scrum Master','Business Analyst','Tech Writer','Performance Engineer','ML Engineer','Accessibility Expert'];
function newCell(name){ return {id:uid(),name:name||'Support Cell',members:[]}; }
function resource(role,name,loc,alloc,side){
  const p=person(role||'Ressource','tech',name||'',loc||'',(name?'Occupé':'Ouvert'));
  if(side)p.side=side; p.alloc=(alloc===''||alloc==null||isNaN(+alloc))?100:+alloc; return p;
}
function seed(){
  const h=newHead();
  h.product.name='Sophie Petit'; h.product.loc='FR'; h.product.status='Occupé';
  h.tech.name='Karim El Amrani'; h.tech.loc='Maroc'; h.tech.status='Occupé';
  const s=newSquad('Squad Acquisition','Acquisition & croissance des nouveaux utilisateurs.');
  s.pm.name='Emma Laurent'; s.pm.loc='FR'; s.pm.status='Occupé';
  s.lead.name='Youssef Benali'; s.lead.loc='Maroc'; s.lead.status='Occupé';
  s.members.push(person('Frontend Engineer','tech','Lucas Girard','FR','Occupé'));
  s.members.push(person('Backend Engineer','tech','Fatima Zahra','Maroc','Occupé'));
  s.members.push(person('Product Designer','produit','Nadia Roux','FR','Occupé'));
  s.members.push(person('Data Analyst','tech','','Maroc','Ouvert'));
  h.squads.push(s);
  const cell=newCell('Support Cell — Craft');
  cell.members.push(resource('Software Architect','Damien Roy','FR',40,'tech'));
  cell.members.push(resource('QA Engineer','Ines Haddad','Maroc',60,'tech'));
  cell.members.push(resource('UX Designer','Léa Dubois','FR',30,'produit'));
  h.cells.push(cell);
  const fly=newSquad('Squad Innovation','Squad volante rattachée à la Direction.',true);
  fly.pm.name='Manon Girard'; fly.pm.loc='FR'; fly.pm.status='Occupé';
  fly.lead.name='Reda Tahiri'; fly.lead.loc='Maroc'; fly.lead.status='Occupé';
  fly.members.push(person('Fullstack Engineer','tech','','FR','Ouvert'));
  return {
    direction:{product:person('CPO','produit','Claire Moreau','FR','Occupé'),
               tech:person('CTO','tech','Julien Bernard','FR','Occupé')},
    heads:[h], squads:[fly]
  };
}
function blank(){
  return {direction:{product:person('CPO','produit','','','Ouvert'),
                     tech:person('CTO','tech','','','Ouvert')},heads:[],squads:[]};
}

/* ---------------- Persistance ---------------- */
function save(){ try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){} }
function load(){
  try{const raw=localStorage.getItem(LS_KEY); if(raw){state=JSON.parse(raw); migrate(); return;}}catch(e){}
  state=seed();
}
function migrate(){ if(!Array.isArray(state.squads))state.squads=[]; (state.heads||[]).forEach(h=>{ if(!Array.isArray(h.cells))h.cells=[]; }); }

/* ---------------- Rendu ---------------- */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function reg(p){pmap[p.pid]=p;return p;}
function locBadge(p){
  if(p.loc==='FR')return '<span class="badge fr">Hub · FR</span>';
  if(p.loc==='Maroc')return '<span class="badge coe">COE · Maroc</span>';
  return '';
}
function cardHTML(p){
  reg(p); const open=!p.name; const name=open?'Poste ouvert':p.name;
  const stat=open&&p.status?`<span class="badge status">${esc(p.status)}</span>`:'';
  return `<div class="card ${p.side} ${open?'isopen':''}" data-action="edit" data-pid="${p.pid}">
    <div class="accent"></div>
    <div class="role">${esc(p.role)}</div>
    <div class="name ${open?'open':''}">${esc(name)}</div>
    <div class="foot">${locBadge(p)}${stat}</div>
  </div>`;
}
function miniHTML(p){
  reg(p); const open=!p.name; const name=open?'Ouvert':p.name;
  const loc=p.loc==='FR'?'<span class="mdot fr"></span><span class="m-loc">FR</span>'
          :p.loc==='Maroc'?'<span class="mdot coe"></span><span class="m-loc">Maroc</span>':'';
  return `<div class="mini ${p.side} ${open?'isopen':''}" data-action="edit" data-pid="${p.pid}">
    <div class="accent"></div>
    <div class="m-name ${open?'open':''}">${esc(name)}</div>
    <div class="m-role">${esc(p.role)}</div>
    <div class="m-foot">${loc}</div>
  </div>`;
}
function duoHTML(a,b){return `<div class="duo">${cardHTML(a)}${cardHTML(b)}</div>`;}

function squadHTML(sq,flying){
  const isColl=collapsed.has(sq.id);
  const hasDuo=!!(sq.pm&&sq.lead);
  const total=(hasDuo?2:0)+sq.members.length;
  const members=sq.members.map(miniHTML).join('');
  const add=`<div class="add-mini" data-action="add-member" data-squad="${sq.id}">＋ Membre</div>`;
  const rnd=`<div class="rnd-title">${hasDuo?'Équipe R&D':'Membres'} · ${sq.members.length}</div><div class="rnd-grid">${members}${add}</div>`;
  const desc=sq.desc?`<div class="bucket-desc">${esc(sq.desc)}</div>`:'';
  const duo=hasDuo?duoHTML(sq.pm,sq.lead):'';
  const body=isColl?'':`<div class="bucket-body">${duo}${rnd}</div>`;
  const fold=`<button class="foldbtn sqfold ${isColl?'iscoll':''}" data-action="toggle" data-id="${sq.id}" title="${isColl?'Déplier':'Replier'}">${isColl?'+':'−'}<span class="fn">${total}</span></button>`;
  const badge=flying?'<span class="fly-badge">Volante</span>':'';
  return `<div class="bucket ${isColl?'iscoll':''} ${flying?'flying':''}">
    <div class="bucket-head" data-action="edit-squad" data-squad="${sq.id}">
      <span class="sq"></span>
      <div class="bh-txt"><span class="title">${esc(sq.name)}</span>${desc}</div>
      ${badge}<span class="count">${total}</span>
    </div>
    ${body}
  </div>${fold}`;
}

function addToolsHTML(ctxHead,showTribu,always){
  return `<div class="node-tools${always?' always':''}">
    ${showTribu?`<button class="ntbtn tribu" data-action="add-head" title="Nouvelle tribu">＋ Tribu</button>`:''}
    <button class="ntbtn add" data-action="add-squad" data-head="${ctxHead||''}" title="Nouvelle squad">＋ Squad</button>
    <button class="ntbtn cellbtn" data-action="add-cell" data-head="${ctxHead||''}" title="Nouvelle Support Cell">＋ Cell</button>
  </div>`;
}
function resourceMiniHTML(p){
  reg(p); const open=!p.name; const name=open?'Ouvert':p.name;
  const loc=p.loc==='FR'?'<span class="mdot fr"></span>FR':p.loc==='Maroc'?'<span class="mdot coe"></span>Maroc':'';
  const alloc=`<span class="alloc">${p.alloc!=null?p.alloc:100}%</span>`;
  return `<div class="cres ${p.side} ${open?'isopen':''}" data-action="edit" data-pid="${p.pid}">
    <div class="accent"></div>
    <div class="cr-top"><span class="cr-name ${open?'open':''}">${esc(name)}</span>${alloc}</div>
    <div class="cr-role">${esc(p.role)}</div>
    <div class="cr-loc">${loc}</div>
  </div>`;
}
function cellHTML(c){
  const isColl=collapsed.has(c.id);
  const members=c.members.map(resourceMiniHTML).join('');
  const add=`<div class="add-res" data-action="add-res" data-cell="${c.id}">＋ Ressource</div>`;
  const body=isColl?'':`<div class="cell-body">${members}${add}</div>`;
  const fold=`<button class="foldbtn cellfold ${isColl?'iscoll':''}" data-action="toggle" data-id="${c.id}" title="${isColl?'Déplier':'Replier'}">${isColl?'+':'−'}<span class="fn">${c.members.length}</span></button>`;
  return `<div class="cell ${isColl?'iscoll':''}">
    <div class="cell-head" data-action="edit-cell" data-cell="${c.id}">
      <span class="cdot"></span><span class="cname">${esc(c.name)}</span>
      <span class="badge-sc">Support Cell</span>
      <span class="ccount">${c.members.length}</span>
    </div>
    ${body}
  </div>${fold}`;
}
function headHTML(h){
  const isColl=collapsed.has(h.id);
  const cells=h.cells||[];
  const childCount=h.squads.length+cells.length;
  const hasKids=childCount>0;
  const tribe=`<div class="tribe">
      <div class="tribe-cap" data-action="edit-tribe" data-head="${h.id}"><span class="tc-left"><span class="tc-dot"></span>Tribu · Head of Product / Engineering Manager</span><span class="cap-edit">⚙</span></div>
      <div class="node-head">${duoHTML(h.product,h.tech)}</div>
    </div>`;
  const fold=hasKids?`<button class="foldbtn ${isColl?'iscoll':''}" data-action="toggle" data-id="${h.id}" title="${isColl?'Déplier':'Replier'}">${isColl?'+':'−'}<span class="fn">${childCount}</span></button>`:'';
  const content=`<div class="node-content">${tribe}${fold}${addToolsHTML(h.id)}</div>`;
  const squadLis=h.squads.map(sq=>`<li><div class="node-content">${squadHTML(sq)}</div></li>`).join('');
  const cellLis=cells.map(c=>`<li><div class="node-content">${cellHTML(c)}</div></li>`).join('');
  const kids=hasKids?`<ul>${squadLis}${cellLis}</ul>`:'';
  return `<li class="${isColl?'collapsed':''}">${content}${kids}</li>`;
}

function render(){
  pmap={};
  const d=state.direction;
  const flySquads=state.squads||[];
  const childCount=state.heads.length+flySquads.length;
  const hasChildren=childCount>0;
  const dirColl=collapsed.has('DIR');
  const dFold=hasChildren?`<button class="foldbtn ${dirColl?'iscoll':''}" data-action="toggle" data-id="DIR" title="${dirColl?'Déplier':'Replier'}">${dirColl?'+':'−'}<span class="fn">${childCount}</span></button>`:'';
  const dTools=`<div class="node-tools${hasChildren?'':' always'}">
      <button class="ntbtn tribu" data-action="add-head" title="Nouvelle tribu">＋ Tribu</button>
      <button class="ntbtn add" data-action="add-squad" data-head="__dir__" title="Nouvelle squad volante">＋ Squad</button>
      <button class="ntbtn cellbtn" data-action="add-cell" data-head="" title="Nouvelle Support Cell">＋ Cell</button>
    </div>`;
  const dirNode=`<div class="node-content node-direction">
      <div class="tribe direction-tribe">
        <div class="tribe-cap"><span class="tc-left"><span class="tc-dot"></span>Direction · CPO / CTO</span></div>
        <div>${duoHTML(d.product,d.tech)}</div>
      </div>${dFold}${dTools}</div>`;
  const childrenHTML=hasChildren?`<ul>${state.heads.map(headHTML).join('')}${flySquads.map(sq=>`<li><div class="node-content">${squadHTML(sq,true)}</div></li>`).join('')}</ul>`:'';
  canvas.innerHTML=`<div class="tree"><ul><li class="rootnode ${dirColl?'collapsed':''}">${dirNode}${childrenHTML}</li></ul></div>`;
  updateStats();
  fitIfNeeded();
}
function updateStats(){
  const all=[state.direction.product,state.direction.tech]; let squads=0;
  const addSquad=s=>{ squads++; if(s.pm)all.push(s.pm); if(s.lead)all.push(s.lead); s.members.forEach(m=>all.push(m)); };
  state.heads.forEach(h=>{ all.push(h.product,h.tech); (h.squads||[]).forEach(addSquad); (h.cells||[]).forEach(c=>c.members.forEach(m=>all.push(m))); });
  (state.squads||[]).forEach(addSquad);
  let open=0; all.forEach(p=>{ if(!p.name)open++; });
  $('#stats').innerHTML=`<span><b>${state.heads.length}</b> tribus</span><span><b>${squads}</b> squads</span><span><b>${all.length}</b> postes</span><span><b>${open}</b> ouverts</span>`;
}

/* ---------------- Actions ---------------- */
canvas.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]'); if(!t)return;
  const a=t.dataset.action;
  if(a==='edit'){ openEditor(pmap[t.dataset.pid],'person'); }
  else if(a==='edit-squad'){ const sq=findSquad(t.dataset.squad); openEditor(sq,'squad'); }
  else if(a==='edit-tribe'){ const h=state.heads.find(x=>x.id===t.dataset.head); if(h)openEditor(h,'tribe'); }
  else if(a==='toggle'){ const id=t.dataset.id; collapsed.has(id)?collapsed.delete(id):collapsed.add(id); render(); }
  else if(a==='add-head'){ state.heads.push(newHead()); commit(); toast('Tribu ajoutée'); }
  else if(a==='add-squad'){ openSquadCreator(t.dataset.head); }
  else if(a==='add-member'){ const sq=findSquad(t.dataset.squad); const m=reg(person('Rôle R&D','tech')); sq.members.push(m); commit(); openEditor(m,'person'); }
  else if(a==='add-cell'){ openCellCreator(t.dataset.head); }
  else if(a==='edit-cell'){ const c=findCell(t.dataset.cell); if(c)openEditor(c,'cell'); }
  else if(a==='add-res'){ const c=findCell(t.dataset.cell); const r=reg(resource('','', '',100,'tech')); c.members.push(r); commit(); openEditor(r,'person'); }
  else if(a==='del-head'){ if(confirm('Supprimer cette tribu et ses squads ?')){ state.heads=state.heads.filter(x=>x.id!==t.dataset.head); commit(); } }
  else if(a==='del-squad'){ if(confirm('Supprimer cette squad ?')){ deleteSquad(t.dataset.squad); commit(); } }
});
function commit(){ save(); render(); }
function findSquad(id){ for(const h of state.heads) for(const s of h.squads) if(s.id===id) return s; for(const s of (state.squads||[])) if(s.id===id) return s; return null; }
function deleteSquad(id){ state.heads.forEach(h=>h.squads=h.squads.filter(s=>s.id!==id)); state.squads=(state.squads||[]).filter(s=>s.id!==id); collapsed.delete(id); }
function findMemberCtx(pid){
  for(const h of state.heads) for(const s of h.squads){ const i=s.members.findIndex(m=>m.pid===pid); if(i>=0) return {squad:s,index:i}; }
  for(const s of (state.squads||[])){ const i=s.members.findIndex(m=>m.pid===pid); if(i>=0) return {squad:s,index:i}; }
  return null;
}
function findCell(id){ for(const h of state.heads) for(const c of (h.cells||[])) if(c.id===id) return c; return null; }
function findCellCtx(pid){ for(const h of state.heads) for(const c of (h.cells||[])){ const i=c.members.findIndex(m=>m.pid===pid); if(i>=0) return {cell:c,index:i}; } return null; }
function findHeadOfCell(id){ return state.heads.find(h=>(h.cells||[]).some(c=>c.id===id))||null; }

/* ---------------- Éditeur ---------------- */
let edCtx=null;
function openEditor(obj,kind){
  edCtx={obj,kind}; const ov=$('#overlay'), ed=$('#editor');
  if(kind==='squad'){
    $('#edKind').textContent='Squad';
    const curHead=findHeadOfSquad(obj.id);
    const hasDuo=!!(obj.pm&&obj.lead);
    const hopts=state.heads.map((h,i)=>`<option value="${h.id}" ${curHead&&h.id===curHead.id?'selected':''}>${esc(headLabel(h,i))}</option>`).join('');
    $('#edBody').innerHTML=`
      <div class="field"><label>Nom de la squad</label><input id="f-sqname" value="${esc(obj.name)}"></div>
      <div class="field"><label>Description / mission</label><textarea class="f" id="f-sqdesc" placeholder="Objectif de la squad, périmètre...">${esc(obj.desc||'')}</textarea></div>
      <div class="field"><label>Rattachement</label>
        <select id="f-sqhead" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13.5px">
          <option value="__dir__" ${!curHead?'selected':''}>Direction — squad volante (hors tribu)</option>
          ${hopts}<option value="__new__">＋ Nouveau binôme HoP / EM</option></select></div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="f-sqduo" ${hasDuo?'checked':''} style="width:auto"> Duo Product Manager / Tech Lead</label></div>
      <div class="hint">Une squad peut être rattachée à une tribu ou directement à la Direction (volante). Le duo PM / Tech Lead est optionnel.</div>`;
    $('#edFoot').innerHTML=`<button class="btn" id="edDelSquad" style="flex:0 0 auto;color:#dc2626;border-color:#fecaca">Supprimer</button><button class="btn primary" id="edSave">Enregistrer</button>`;
    $('#edSave').onclick=()=>{
      obj.name=$('#f-sqname').value.trim()||'Squad'; obj.desc=$('#f-sqdesc').value.trim();
      const wantDuo=$('#f-sqduo').checked, hasD=!!(obj.pm&&obj.lead);
      if(wantDuo&&!hasD){ obj.pm=person('Product Manager','produit'); obj.lead=person('Tech Lead','tech'); }
      else if(!wantDuo&&hasD){ const named=(obj.pm.name||obj.lead.name); if(!named||confirm('Retirer le duo PM / Tech Lead ?')){ obj.pm=null; obj.lead=null; } }
      let target=$('#f-sqhead').value;
      if(target==='__new__'){ const nh=newHead(); state.heads.push(nh); target=nh.id; }
      const curId=curHead?curHead.id:'__dir__';
      if(target!==curId) moveSquad(obj.id,target);
      commit(); closeEditor();
    };
    $('#edDelSquad').onclick=()=>{ if(confirm('Supprimer cette squad ?')){ deleteSquad(obj.id); commit(); closeEditor(); } };
  } else if(kind==='cell'){
    $('#edKind').textContent='Support Cell';
    $('#edBody').innerHTML=`
      <div class="field"><label>Nom de la Support Cell</label><input id="f-cellname" value="${esc(obj.name)}"></div>
      <div class="hint">Ressources transverses rattachées au binôme de la tribu, allouées en % aux squads. Ajoute des ressources avec « ＋ Ressource » sur le bloc.</div>`;
    $('#edFoot').innerHTML=`<button class="btn" id="edDelCell" style="flex:0 0 auto;color:#dc2626;border-color:#fecaca">Supprimer</button><button class="btn primary" id="edSave">Enregistrer</button>`;
    $('#edSave').onclick=()=>{ obj.name=$('#f-cellname').value.trim()||'Support Cell'; commit(); closeEditor(); };
    $('#edDelCell').onclick=()=>{ if(confirm('Supprimer cette Support Cell ?')){ const h=findHeadOfCell(obj.id); if(h)h.cells=h.cells.filter(c=>c.id!==obj.id); commit(); closeEditor(); } };
  } else if(kind==='tribe'){
    $('#edKind').textContent='Tribu';
    $('#edBody').innerHTML=`
      <div class="hint" style="margin-bottom:14px">Binôme <b>${esc(binomeLabel(obj))}</b>. Clique sur les cartes Head of Product / Engineering Manager pour renseigner les personnes.</div>
      <div class="field"><label>Squads rattachées</label><input value="${obj.squads.length}" disabled style="background:#f9fafb;color:var(--muted)"></div>
      <div class="field"><label>Support Cells</label><input value="${(obj.cells||[]).length}" disabled style="background:#f9fafb;color:var(--muted)"></div>`;
    $('#edFoot').innerHTML=`<button class="btn" id="edDelTribe" style="flex:1;justify-content:center;color:#dc2626;border-color:#fecaca">Supprimer la tribu</button>`;
    $('#edDelTribe').onclick=()=>{ if(confirm('Supprimer cette tribu, ses squads et Support Cells ?')){ state.heads=state.heads.filter(x=>x.id!==obj.id); collapsed.delete(obj.id); commit(); closeEditor(); } };
  } else {
    const p=obj; const isMember=!!findMemberCtx(p.pid); const isCell=!!findCellCtx(p.pid);
    const fixedRole=['CPO','CTO','Head of Product','Engineering Manager','Product Manager','Tech Lead'].includes(p.role) && !isMember && !isCell;
    $('#edKind').textContent=fixedRole?p.role:(isCell?'Ressource transverse':isMember?'Membre R&D':'Poste');
    const roleField=fixedRole
      ? `<div class="field"><label>Poste</label><input value="${esc(p.role)}" disabled style="background:#f9fafb;color:var(--muted)"></div>`
      : `<div class="field"><label>Poste / expertise</label><input id="f-role" list="roleList" value="${esc(p.role)}" placeholder="ex: QA Engineer"></div>`;
    const sideField=(isMember||isCell)?`
      <div class="field"><label>Filière</label><div class="seg" id="seg-side">
        <button data-v="produit" class="${p.side==='produit'?'on produit':''}">Produit</button>
        <button data-v="tech" class="${p.side==='tech'?'on tech':''}">Tech</button>
      </div></div>`:'';
    const allocField=isCell?`
      <div class="field"><label>Allocation de temps sur la tribu</label>
        <div style="display:flex;align-items:center;gap:8px"><input id="f-alloc" type="number" min="0" max="100" step="5" value="${p.alloc!=null?p.alloc:100}" style="width:110px"><span style="color:var(--muted);font-size:13px">%</span></div>
        <div class="seg" id="seg-alloc" style="margin-top:8px">${[25,50,75,100].map(v=>`<button type="button" data-v="${v}">${v}%</button>`).join('')}</div>
      </div>`:'';
    $('#edBody').innerHTML=`
      <div class="field"><label>Nom</label><input id="f-name" value="${esc(p.name)}" placeholder="Laisser vide = poste ouvert" autofocus></div>
      ${roleField}
      ${sideField}
      ${allocField}
      <div class="field"><label>Localisation</label><div class="seg" id="seg-loc">
        <button data-v="" class="${!p.loc?'on':''}">—</button>
        <button data-v="FR" class="${p.loc==='FR'?'on fr':''}">Hub · FR</button>
        <button data-v="Maroc" class="${p.loc==='Maroc'?'on coe':''}">COE · Maroc</button>
      </div></div>
      <div class="field"><label>Statut</label><div class="seg" id="seg-stat">
        ${STATUSES.map(s=>`<button data-v="${s}" class="${p.status===s?'on'+(s!=='Occupé'?' open':''):''}">${s}</button>`).join('')}
      </div></div>`;
    wireSeg('seg-side'); wireSeg('seg-loc'); wireSeg('seg-stat');
    if(isCell){ document.querySelectorAll('#seg-alloc button').forEach(b=>b.onclick=()=>{ $('#f-alloc').value=b.dataset.v; }); }
    const delBtn=(isMember||isCell)?`<button class="btn" id="edDel" style="flex:0 0 auto;color:#dc2626;border-color:#fecaca">Supprimer</button>`:'';
    $('#edFoot').innerHTML=`${delBtn}<button class="btn primary" id="edSave">Enregistrer</button>`;
    $('#edSave').onclick=()=>{
      p.name=$('#f-name').value.trim();
      if($('#f-role')) p.role=$('#f-role').value.trim()||p.role;
      const side=segVal('seg-side'); if(side)p.side=side;
      p.loc=segVal('seg-loc'); p.status=segVal('seg-stat')||p.status;
      if(isCell){ const a=parseInt($('#f-alloc').value,10); p.alloc=isNaN(a)?100:Math.max(0,Math.min(100,a)); }
      commit(); closeEditor();
    };
    if(isMember||isCell)$('#edDel').onclick=()=>{ if(isCell){ const c=findCellCtx(p.pid); c.cell.members.splice(c.index,1); } else { const c=findMemberCtx(p.pid); c.squad.members.splice(c.index,1); } commit(); closeEditor(); };
  }
  ov.classList.add('open'); ed.classList.add('open');
}
let segState={};
function wireSeg(id){ const el=document.getElementById(id); if(!el)return;
  const cur=el.querySelector('.on'); segState[id]=cur?cur.dataset.v:'';
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    el.querySelectorAll('button').forEach(x=>x.className='');
    let cls='on'; const v=b.dataset.v;
    if(id==='seg-side')cls+=' '+v; if(id==='seg-loc')cls+= v==='FR'?' fr':v==='Maroc'?' coe':''; if(id==='seg-stat')cls+= v!=='Occupé'?' open':'';
    b.className=cls; segState[id]=v;
  });
}
function segVal(id){ return document.getElementById(id)?segState[id]:''; }
function closeEditor(){ $('#overlay').classList.remove('open'); $('#editor').classList.remove('open'); edCtx=null; }
$('#edClose').onclick=closeEditor; $('#overlay').onclick=closeEditor;
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeEditor(); closeModal(); } });

/* ---------------- Zoom & déplacement ---------------- */
let tx=0,ty=0,scale=1;
function apply(){ canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; $('#zLvl').textContent=Math.round(scale*100)+'%'; }
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
let firstFit=true;
function fitIfNeeded(){ if(firstFit){ firstFit=false; fitView(); } else apply(); }
function fitView(){
  const tree=canvas.querySelector('.tree'); if(!tree)return;
  const tw=tree.offsetWidth+80, th=tree.offsetHeight+80;
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  scale=clamp(Math.min(vw/tw,vh/th,1),0.25,1);
  tx=Math.max((vw-tw*scale)/2,20)+40*scale; ty=30; apply();
}
viewport.addEventListener('wheel',e=>{ e.preventDefault();
  const r=viewport.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const ns=clamp(scale*Math.exp(-e.deltaY*0.0015),0.25,2.5);
  tx=mx-(mx-tx)*(ns/scale); ty=my-(my-ty)*(ns/scale); scale=ns; apply();
},{passive:false});
let panning=false,psx,psy;
viewport.addEventListener('mousedown',e=>{ if(e.target.closest('[data-action]'))return; panning=true; psx=e.clientX-tx; psy=e.clientY-ty; viewport.classList.add('grabbing'); });
window.addEventListener('mousemove',e=>{ if(!panning)return; tx=e.clientX-psx; ty=e.clientY-psy; apply(); });
window.addEventListener('mouseup',()=>{ panning=false; viewport.classList.remove('grabbing'); });
function zoomBtn(f){ const vw=viewport.clientWidth/2, vh=viewport.clientHeight/2, ns=clamp(scale*f,0.25,2.5); tx=vw-(vw-tx)*(ns/scale); ty=vh-(vh-ty)*(ns/scale); scale=ns; apply(); }
$('#zIn').onclick=()=>zoomBtn(1.2); $('#zOut').onclick=()=>zoomBtn(1/1.2); $('#zFit').onclick=fitView;
window.addEventListener('resize',()=>apply());

/* ---------------- Toolbar ---------------- */
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
$('#exportBtn').onclick=()=>{ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='organisation.json'; a.click(); toast('Exporté en JSON'); };
$('#importBtn').onclick=()=>$('#fileInput').click();
$('#fileInput').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(!d.direction||!d.heads)throw 0; state=d; firstFit=true; commit(); toast('Organisation importée'); }catch(err){ toast('Fichier JSON invalide'); } }; r.readAsText(f); e.target.value=''; };
$('#printBtn').onclick=()=>window.print();
$('#resetBtn').onclick=()=>{ if(confirm('Repartir d\'une organisation vide ?')){ state=blank(); collapsed.clear(); firstFit=true; commit(); } };

/* ---------------- Créateur de squad ---------------- */
let rndDraft=[];
function openSquadCreator(preHeadId){
  rndDraft=[];
  const isDir=preHeadId==='__dir__';
  const opts=state.heads.map((h,i)=>`<option value="${h.id}" ${h.id===preHeadId?'selected':''}>${esc(headLabel(h,i))}</option>`).join('');
  $('#mBody').innerHTML=`
    <div class="section">Informations</div>
    <div class="fld"><label>Nom de la squad *</label><input id="c-name" placeholder="ex: Squad Checkout"></div>
    <div class="fld"><label>Description / mission</label><textarea class="f" id="c-desc" placeholder="Objectif, périmètre, produit couvert..."></textarea></div>
    <div class="fld"><label>Rattachement *</label>
      <select id="c-head">
        <option value="__dir__" ${isDir?'selected':''}>Direction — squad volante (hors tribu)</option>
        ${opts}
        <option value="__new__">＋ Créer un nouveau binôme HoP / EM</option>
      </select></div>
    <div class="fld"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="c-duo" ${isDir?'':'checked'} style="width:auto"> Inclure le duo Product Manager / Tech Lead</label></div>
    <div id="c-leads" style="${isDir?'display:none':''}">
      <div class="section">Leads</div>
      <div class="row2">${leadBox('pm','produit','Product Manager')}${leadBox('lead','tech','Tech Lead')}</div>
    </div>
    <div class="section">Membres <span style="text-transform:none;font-weight:500;color:var(--faint)">— optionnel</span></div>
    <div id="c-rnd"></div>
    <button class="add-row" id="c-addrnd">＋ Ajouter un membre</button>`;
  renderRnd(); wireMiniSeg();
  $('#c-addrnd').onclick=()=>{ rndDraft.push({role:'',side:'tech',name:'',loc:''}); renderRnd(); };
  $('#c-duo').onchange=()=>{ $('#c-leads').style.display=$('#c-duo').checked?'':'none'; };
  $('#mIco').textContent='S'; $('#mTitle').textContent='Nouvelle squad';
  $('#mSub').textContent='Rattachable à une tribu ou directement à la Direction (squad volante)';
  $('#mCreate').textContent='Créer la squad'; $('#mCreate').onclick=createSquad;
  $('#modalOv').classList.add('open'); $('#modal').classList.add('open');
  setTimeout(()=>{const el=$('#c-name');if(el)el.focus();},60);
}
function leadBox(key,side,title){
  return `<div class="lead-box ${side}">
    <div class="lb-title">${title}</div>
    <input id="c-${key}-name" placeholder="Nom (vide = poste ouvert)">
    <div class="mini-seg" id="c-${key}-loc">
      <button data-v="" class="on">—</button><button data-v="FR">Hub FR</button><button data-v="Maroc">COE Maroc</button>
    </div></div>`;
}
function wireMiniSeg(){
  document.querySelectorAll('.mini-seg').forEach(seg=>{
    seg.dataset.v='';
    seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
      seg.querySelectorAll('button').forEach(x=>x.className='');
      b.className='on'+(b.dataset.v==='FR'?' fr':b.dataset.v==='Maroc'?' coe':'');
      seg.dataset.v=b.dataset.v;
    });
  });
}
function renderRnd(){
  const wrap=$('#c-rnd');
  wrap.innerHTML=rndDraft.map((m,i)=>`
    <div class="rnd-row" data-i="${i}">
      <input data-f="role" placeholder="Rôle (ex: Backend Eng.)" value="${esc(m.role)}">
      <input data-f="name" placeholder="Nom (vide = ouvert)" value="${esc(m.name)}">
      <select data-f="side"><option value="tech" ${m.side==='tech'?'selected':''}>Tech</option><option value="produit" ${m.side==='produit'?'selected':''}>Produit</option></select>
      <select data-f="loc"><option value="" ${!m.loc?'selected':''}>—</option><option value="FR" ${m.loc==='FR'?'selected':''}>FR</option><option value="Maroc" ${m.loc==='Maroc'?'selected':''}>Maroc</option></select>
      <button class="del" data-del="${i}" title="Retirer">×</button>
    </div>`).join('');
  wrap.querySelectorAll('.rnd-row').forEach(r=>{ const i=+r.dataset.i;
    r.querySelectorAll('[data-f]').forEach(el=>{ el.oninput=el.onchange=()=>rndDraft[i][el.dataset.f]=el.value; }); });
  wrap.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ rndDraft.splice(+b.dataset.del,1); renderRnd(); });
}
function closeModal(){ $('#modalOv').classList.remove('open'); $('#modal').classList.remove('open'); }
$('#mClose').onclick=closeModal; $('#mCancel').onclick=closeModal; $('#modalOv').onclick=closeModal;
$('#newSquadBtn').onclick=()=>openSquadCreator(state.heads[0]?state.heads[0].id:'__new__');
function createSquad(){
  const name=$('#c-name').value.trim();
  if(!name){ $('#c-name').focus(); $('#c-name').style.borderColor='#dc2626'; return; }
  const target=$('#c-head').value;
  const withDuo=$('#c-duo').checked;
  const sq=newSquad(name,$('#c-desc').value.trim(),withDuo);
  if(withDuo){
    sq.pm.name=$('#c-pm-name').value.trim(); sq.pm.loc=$('#c-pm-loc').dataset.v||''; sq.pm.status=sq.pm.name?'Occupé':'Ouvert';
    sq.lead.name=$('#c-lead-name').value.trim(); sq.lead.loc=$('#c-lead-loc').dataset.v||''; sq.lead.status=sq.lead.name?'Occupé':'Ouvert';
  }
  rndDraft.forEach(m=>{ if(m.role.trim()||m.name.trim()) sq.members.push(person(m.role.trim()||'Membre',m.side||'tech',m.name.trim(),m.loc||'',m.name.trim()?'Occupé':'Ouvert')); });
  if(target==='__dir__'){ state.squads.push(sq); }
  else { let head; if(target==='__new__'||!state.heads.length){ head=newHead(); state.heads.push(head); } else head=state.heads.find(h=>h.id===target)||state.heads[0]; head.squads.push(sq); collapsed.delete(head.id); }
  collapsed.delete('DIR');
  closeModal(); commit(); toast('Squad « '+name+' » créée');
}

/* ---------------- Créateur de Support Cell ---------------- */
let cellDraft=[], cellHeadId=null;
function openCellCreator(headId){
  cellHeadId=headId; cellDraft=[{role:'',side:'tech',name:'',loc:'',alloc:'100'}];
  const roleOpts=TRANSVERSE_ROLES.map(r=>`<option value="${r}">`).join('');
  const tribeOpts=state.heads.map((h,i)=>`<option value="${h.id}" ${h.id===headId?'selected':''}>${esc(headLabel(h,i))}</option>`).join('');
  $('#mBody').innerHTML=`
    <div class="section">Support Cell</div>
    <div class="fld"><label>Nom de la cellule *</label><input id="cc-name" placeholder="ex: Support Cell — Design"></div>
    <div class="fld"><label>Rattachement — binôme HoP / EM *</label>
      <select id="cc-head">${tribeOpts}<option value="__new__">＋ Nouveau binôme HoP / EM</option></select></div>
    <div class="hint">Ressources transverses (QA, architecte, design, data…) rattachées à ce binôme et allouées en % aux squads de la tribu.</div>
    <div class="section" style="margin-top:16px">Ressources</div>
    <div id="cc-res"></div>
    <button class="add-row" id="cc-addres">＋ Ajouter une ressource</button>
    <datalist id="ccRoles">${roleOpts}</datalist>`;
  renderCellRes();
  $('#cc-addres').onclick=()=>{ cellDraft.push({role:'',side:'tech',name:'',loc:'',alloc:'100'}); renderCellRes(); };
  $('#mIco').textContent='◇'; $('#mTitle').textContent='Nouvelle Support Cell';
  $('#mSub').textContent='Ressources transverses rattachées au binôme de la tribu';
  $('#mCreate').textContent='Créer la Support Cell'; $('#mCreate').onclick=createCell;
  $('#modalOv').classList.add('open'); $('#modal').classList.add('open');
  setTimeout(()=>{const el=$('#cc-name');if(el)el.focus();},60);
}
function renderCellRes(){
  const wrap=$('#cc-res');
  wrap.innerHTML=cellDraft.map((m,i)=>`
    <div class="rnd-row cell-row" data-i="${i}">
      <input data-f="role" list="ccRoles" placeholder="Rôle / expertise" value="${esc(m.role)}">
      <input data-f="name" placeholder="Nom (vide = ouvert)" value="${esc(m.name)}">
      <select data-f="loc"><option value="" ${!m.loc?'selected':''}>—</option><option value="FR" ${m.loc==='FR'?'selected':''}>FR</option><option value="Maroc" ${m.loc==='Maroc'?'selected':''}>Maroc</option></select>
      <div class="alloc-in"><input data-f="alloc" type="number" min="0" max="100" step="5" value="${esc(m.alloc)}"><span>%</span></div>
      <button class="del" data-del="${i}" title="Retirer">×</button>
    </div>`).join('');
  wrap.querySelectorAll('.rnd-row').forEach(r=>{ const i=+r.dataset.i;
    r.querySelectorAll('[data-f]').forEach(el=>{ el.oninput=el.onchange=()=>cellDraft[i][el.dataset.f]=el.value; }); });
  wrap.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ cellDraft.splice(+b.dataset.del,1); renderCellRes(); });
}
function createCell(){
  const name=$('#cc-name').value.trim();
  if(!name){ $('#cc-name').focus(); $('#cc-name').style.borderColor='#dc2626'; return; }
  const sel=$('#cc-head')?$('#cc-head').value:cellHeadId;
  let head;
  if(sel==='__new__'||!state.heads.length){ head=newHead(); state.heads.push(head); }
  else head=state.heads.find(h=>h.id===sel)||state.heads[0];
  const cell=newCell(name);
  cellDraft.forEach(m=>{ if(m.role.trim()||m.name.trim()) cell.members.push(resource(m.role.trim(),m.name.trim(),m.loc||'',m.alloc,m.side||'tech')); });
  head.cells=head.cells||[]; head.cells.push(cell);
  closeModal(); commit(); toast('Support Cell « '+name+' » créée');
}

/* ---------------- Init ---------------- */
$('#roleList').innerHTML=TRANSVERSE_ROLES.map(r=>`<option value="${r}">`).join('');
load(); render();
</script>
